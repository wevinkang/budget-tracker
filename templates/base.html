<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Budget Tracker{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" href="/"><i class="bi bi-cash-stack me-1"></i>Budget</a>
  <div class="navbar-nav flex-row flex-wrap gap-1 ms-auto">
    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/"><i class="bi bi-speedometer2 me-1"></i><span class="nav-label">Dashboard</span></a>
    <a class="nav-link {% if request.endpoint == 'transactions' %}active{% endif %}" href="/transactions"><i class="bi bi-journal-text me-1"></i><span class="nav-label">Transactions</span></a>
    <a class="nav-link {% if request.endpoint == 'net_income' %}active{% endif %}" href="/net-income"><i class="bi bi-graph-up me-1"></i><span class="nav-label">Net Income</span></a>
    <a class="nav-link {% if request.endpoint == 'reports' %}active{% endif %}" href="/reports"><i class="bi bi-pie-chart me-1"></i><span class="nav-label">Reports</span></a>
    <a class="nav-link {% if request.endpoint == 'accounts' %}active{% endif %}" href="/accounts"><i class="bi bi-wallet2 me-1"></i><span class="nav-label">Accounts</span></a>
    <a class="nav-link {% if request.endpoint == 'import_page' %}active{% endif %}" href="/import"><i class="bi bi-upload me-1"></i><span class="nav-label">Import</span></a>
    <a class="nav-link {% if request.endpoint == 'merchant_rules' %}active{% endif %}" href="/merchant-rules"><i class="bi bi-funnel me-1"></i><span class="nav-label">Rules</span></a>
    <a class="nav-link text-danger ms-2" href="/logout"><i class="bi bi-box-arrow-right"></i></a>
  </div>
</nav>

<div class="container-fluid py-3 px-4">
  {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-info alert-dismissible fade show py-2 mb-2" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
