<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Budget Tracker{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" href="/">💰 Budget</a>
  <div class="navbar-nav flex-row gap-2 ms-auto">
    <a class="nav-link {% if request.endpoint == 'journal' %}active{% endif %}" href="/journal">Journal</a>
    <a class="nav-link {% if request.endpoint == 'net_income' %}active{% endif %}" href="/net-income">Net Income</a>
    <a class="nav-link {% if request.endpoint == 'reports' %}active{% endif %}" href="/reports">Reports</a>
    <a class="nav-link {% if request.endpoint == 'accounts' %}active{% endif %}" href="/accounts">Accounts</a>
    <a class="nav-link {% if request.endpoint == 'import_page' %}active{% endif %}" href="/import">Import</a>
    <a class="nav-link text-danger ms-3" href="/logout">Logout</a>
  </div>
</nav>

<div class="container-fluid py-3 px-4">
  {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-info alert-dismissible fade show py-2 mb-2" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
